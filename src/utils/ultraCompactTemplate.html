<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Compact Confession</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            margin: 0;
        }

        .confession-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 400px; /* Ultra compact for Discord */
            width: 100%;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .confession-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .confession-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 4px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .confession-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: block;
        }

        .content {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border-left: 3px solid #667eea;
            position: relative;
        }

        .content::before {
            content: '"';
            font-size: 2rem;
            color: #667eea;
            position: absolute;
            top: -4px;
            left: 8px;
            font-family: serif;
        }

        .confession-text {
            font-size: 0.9rem;
            line-height: 1.2;
            color: #2c3e50;
            margin-left: 15px;
            font-style: italic;
            word-wrap: break-word;
            overflow-wrap: break-word;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #e9ecef;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .author-icon {
            font-size: 1rem;
        }

        .author-name {
            font-weight: 600;
            color: #495057;
            font-size: 0.8rem;
        }

        .time-info {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #6c757d;
            font-size: 0.7rem;
        }

        .time-icon {
            font-size: 0.8rem;
        }

        .server-info {
            text-align: center;
            margin-top: 10px;
            color: #6c757d;
            font-size: 0.7rem;
        }

        .anonymous {
            color: #e74c3c;
            font-weight: bold;
        }

        .gradient-text {
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Ultra compact for Discord image limitations */
        @media (max-width: 400px) {
            .confession-card {
                padding: 15px;
                max-width: 98%;
            }
            
            .confession-number {
                font-size: 1.3rem;
            }
            
            .confession-text {
                font-size: 0.85rem;
            }
            
            .footer {
                flex-direction: column;
                gap: 4px;
                align-items: flex-start;
            }
        }

        /* Maximum visibility in Discord */
        .confession-text {
            text-shadow: 0 0 3px rgba(255, 255, 255, 1);
            font-weight: 600;
        }

        /* High contrast for Discord */
        .confession-card {
            border: 2px solid rgba(0, 0, 0, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="confession-card">
        <div class="header">
            <span class="confession-icon">💝</span>
            <div class="confession-number gradient-text" id="confessionNumber">Confession #1</div>
        </div>
        
        <div class="content">
            <div class="confession-text" id="confessionText">
                Đây là nội dung confession mẫu được tối ưu hóa cực kỳ compact cho Discord. Template này được thiết kế để bypass hoàn toàn giới hạn 50% width của Discord images.
            </div>
        </div>
        
        <div class="footer">
            <div class="author-info">
                <span class="author-icon" id="authorIcon">👤</span>
                <span class="author-name" id="authorName">Anonymous</span>
            </div>
            
            <div class="time-info">
                <span class="time-icon">⏰</span>
                <span id="timeText">Just now</span>
            </div>
        </div>
        
        <div class="server-info">
            <span id="serverName">Confession Bot • Unknown Server</span>
        </div>
    </div>

    <script>
        // Function to update confession data
        function updateConfession(data) {
            if (data.number) {
                document.getElementById('confessionNumber').textContent = `Confession #${data.number}`;
            }
            
            if (data.content) {
                document.getElementById('confessionText').textContent = data.content;
            }
            
            if (data.author) {
                const authorElement = document.getElementById('authorName');
                const authorIcon = document.getElementById('authorIcon');
                
                if (data.author.isAnonymous) {
                    authorElement.textContent = 'Ẩn danh';
                    authorElement.className = 'author-name anonymous';
                    authorIcon.textContent = '🕵️';
                } else {
                    authorElement.textContent = data.author.username || 'Unknown';
                    authorElement.className = 'author-name';
                    authorIcon.textContent = '👤';
                }
            }
            
            if (data.time) {
                document.getElementById('timeText').textContent = data.time;
            }
            
            if (data.serverName) {
                document.getElementById('serverName').textContent = `Confession Bot • ${data.serverName}`;
            }
        }

        // Expose function globally for Puppeteer
        window.updateConfession = updateConfession;
    </script>
</body>
</html>
